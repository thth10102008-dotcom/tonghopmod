<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video HackHub & Thủ Thuật</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-sidebar: #0b1120;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #3b82f6;
            --ff-color: #ef4444;
            --rb-color: #10b981;
            --mm-color: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Popup Thông Báo */
        #welcomeModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-content {
            background: var(--bg-card); padding: 40px; border-radius: 16px;
            text-align: center; max-width: 400px; width: 90%;
            border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .modal-content h2 { font-size: 24px; margin-bottom: 15px; color: var(--primary); }
        .modal-content p { color: var(--text-sub); margin-bottom: 25px; line-height: 1.5; }
        .btn-close-modal {
            background: var(--primary); color: white; border: none; padding: 12px 30px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-close-modal:hover { background: #2563eb; }

        /* Sidebar Gốc Trái */
        .sidebar {
            width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid #1e293b;
            padding: 20px 0; height: 100vh; position: fixed; display: flex; flex-direction: column;
        }
        .logo { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 40px; color: white; letter-spacing: 1px; }
        .menu-item {
            padding: 15px 25px; display: flex; align-items: center; gap: 15px;
            color: var(--text-sub); text-decoration: none; font-weight: 600;
            cursor: pointer; transition: 0.3s; border-left: 4px solid transparent;
        }
        .menu-item:hover, .menu-item.active { background: #1e293b; color: white; }
        .menu-item.active.ff { border-left-color: var(--ff-color); }
        .menu-item.active.rb { border-left-color: var(--rb-color); }
        .menu-item.active.mm { border-left-color: var(--mm-color); }

        /* Nội dung chính bên phải */
        .main-content {
            margin-left: 260px; width: calc(100% - 260px); padding: 40px;
        }
        .section-header { margin-bottom: 30px; font-size: 28px; font-weight: 800; border-bottom: 2px solid #334155; padding-bottom: 10px; }

        /* Lưới Video */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .card {
            background: var(--bg-card); border-radius: 12px; overflow: hidden;
            border: 1px solid #334155; transition: 0.3s; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        /* Chứa Video YouTube */
        .video-container {
            position: relative; width: 100%; padding-bottom: 56.25%; /* Tỉ lệ 16:9 */ background: #000;
        }
        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card h3 { font-size: 18px; margin-bottom: 10px; line-height: 1.4; }
        .card p { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; }
        
        /* 3 Nút Link Đính Kèm */
        .links-group { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        .download-btn {
            display: block; width: 100%; text-align: center; padding: 12px;
            border-radius: 8px; font-weight: 600; text-decoration: none; color: white;
            transition: 0.3s; font-size: 14px;
        }
        .btn-1 { background: #334155; } .btn-1:hover { background: #475569; }
        .btn-2 { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.5); } 
        .btn-2:hover { background: rgba(59, 130, 246, 0.4); }
        .btn-3 { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.5); }
        .btn-3:hover { background: rgba(16, 185, 129, 0.4); }

        .loader { text-align: center; padding: 50px; color: var(--primary); font-size: 18px; font-weight: bold; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 10px 0; border-right: none; border-bottom: 1px solid #1e293b; }
            .logo { margin-bottom: 10px; }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="welcomeModal">
        <div class="modal-content">
            <h2>Chào mừng bạn! 🎉</h2>
            <p>Tại đây tổng hợp các video thủ thuật, bản cập nhật mới nhất của Free Fire, Roblox và các kèo kiếm tiền online xịn xò nhất.</p>
            <button class="btn-close-modal" onclick="closeModal()">Vào Trang Web</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo">🔥THANH ĐÂY </div>
        <div class="menu-item ff active" onclick="changeTab('Free Fire', this)">🔥 Free Fire</div>
        <div class="menu-item rb" onclick="changeTab('Roblox', this)">🎮 Roblox</div>
        <div class="menu-item mm" onclick="changeTab('Kiếm Tiền', this)">💰 Web Kiếm Tiền</div>
    </div>

    <div class="main-content">
        <h2 class="section-header" id="categoryTitle">🔥 Free Fire</h2>
        <div id="contentArea">
            <div class="loader">⏳ Đang tải dữ liệu video từ hệ thống...</div>
        </div>
    </div>

    <script>
        // Link API Google Sheets của bạn
        const API_URL = "https://script.google.com/macros/s/AKfycbw0jFmXyWvimxqFbmWm8d1Pcyof6w3gug0aYKRVR82xs0xnfDBOyr2dtklNQik1UacU/exec";
        
        let allData = []; // Biến lưu toàn bộ dữ liệu

        // 1. Đóng Popup thông báo
        function closeModal() {
            document.getElementById('welcomeModal').style.display = 'none';
        }

        // 2. Chuyển đổi Link Youtube thường thành link Embed để phát trực tiếp trên web
        function getEmbedUrl(url) {
            if (!url) return '';
            let videoId = '';
            if (url.includes('youtube.com/watch?v=')) {
                videoId = url.split('v=')[1].split('&')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('youtube.com/embed/')) {
                return url; // Đã là link embed sẵn
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : '';
        }

        // 3. Tải dữ liệu từ Google Sheets
        async function loadData() {
            try {
                const response = await fetch(API_URL);
                allData = await response.json();
                allData.reverse(); // Mới nhất lên đầu
                
                // Mặc định load chuyên mục Free Fire đầu tiên
                renderContent('Free Fire');
            } catch (error) {
                document.getElementById('contentArea').innerHTML = "<p style='color:red;'>Lỗi tải dữ liệu. Vui lòng thử lại sau.</p>";
            }
        }

        // 4. Chuyển tab khi bấm menu bên trái
        function changeTab(category, element) {
            // Đổi hiệu ứng sáng menu
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            // Đổi tiêu đề
            let titlePrefix = "🔥";
            if(category === "Roblox") titlePrefix = "🎮";
            if(category === "Kiếm Tiền") titlePrefix = "💰";
            document.getElementById('categoryTitle').innerText = `${titlePrefix} ${category}`;

            // Render lại video
            renderContent(category);
        }

        // 5. Hiển thị Video và Link ra màn hình
        function renderContent(category) {
            const filteredData = allData.filter(item => item.category === category);
            const contentArea = document.getElementById('contentArea');

            if(filteredData.length === 0) {
                contentArea.innerHTML = "<p style='color:var(--text-sub);'>Chưa có video nào ở mục này.</p>";
                return;
            }

            let html = '<div class="grid">';
            filteredData.forEach(item => {
                // Xử lý video hoặc ảnh bìa
                let mediaHtml = '';
                const embedLink = getEmbedUrl(item.video);
                
                if (embedLink) {
                    mediaHtml = `<div class="video-container"><iframe src="${embedLink}" allowfullscreen></iframe></div>`;
                } else {
                    // Nếu admin quên nhập link video, chỉ hiện ảnh bìa
                    mediaHtml = `<img src="${item.image}" alt="Ảnh" style="width:100%; height:200px; object-fit:cover;">`;
                }

                html += `
                <div class="card">
                    ${mediaHtml}
                    <div class="card-content">
                        <h3>${item.title}</h3>
                        ${item.content ? `<p>${item.content}</p>` : ''}
                        
                        <div class="links-group">
                            ${item.link1 ? `<a href="${item.link1}" target="_blank" class="download-btn btn-1">${item.linkTitle1 || 'Tải Xuống 1'}</a>` : ''}
                            ${item.link2 ? `<a href="${item.link2}" target="_blank" class="download-btn btn-2">${item.linkTitle2 || 'Link Dự Phòng 1'}</a>` : ''}
                            ${item.link3 ? `<a href="${item.link3}" target="_blank" class="download-btn btn-3">${item.linkTitle3 || 'Link Dự Phòng 2'}</a>` : ''}
                        </div>
                    </div>
                </div>`;
            });
            html += '</div>';
            contentArea.innerHTML = html;
        }

        // Khởi động lấy dữ liệu
        loadData();
    </script>
</body>
</html>
